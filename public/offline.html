<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <title>CORE offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.22), transparent 34%),
          linear-gradient(135deg, #020617 0%, #0f172a 100%);
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(148, 163, 184, 0.24);
        border-radius: 28px;
        padding: 28px;
        background: rgba(15, 23, 42, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
      }

      .mark {
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
        border-radius: 18px;
        background: linear-gradient(135deg, #0ea5e9, #38bdf8);
        color: #020617;
        font-weight: 900;
        font-size: 24px;
        letter-spacing: -0.08em;
      }

      p.kicker {
        margin: 24px 0 0;
        color: #38bdf8;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 0;
        font-size: clamp(30px, 10vw, 48px);
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      p {
        margin: 18px 0 0;
        color: #94a3b8;
        font-size: 16px;
        line-height: 1.7;
      }

      a {
        min-height: 48px;
        margin-top: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 18px;
        background: #e2e8f0;
        color: #020617;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">C</div>
      <p class="kicker">Modalità offline</p>
      <h1>CORE resta aperto, ma manca la rete.</h1>
      <p>
        Riconnettiti per aggiornare consegna, lista del giorno e dati Supabase.
        Le pagine già aperte possono restare disponibili dal cache locale.
      </p>
      <a href="/oggi">Riprova Oggi</a>
    </main>
  </body>
</html>
